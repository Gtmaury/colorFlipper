<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <style>
    body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  color: white;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  transition: background-color 0.4s ease;
}

h2 {
  font-size: 4rem;
  font-family: monospace;
}

button {
  padding: 10px 25px;
  font-size: 1.2rem;
  cursor: pointer;
  background: white;
  border: none;
  border-radius: 5px;
}
  </style>
  <main>
    <h2 id="color">Color Flipper</h2>
    <button  id="btn">Change</button>
  </main>
</body>
<script src="script.js"></script>
